<div class="page-container">
  <div class="page-header">
    <h1>Suppliers</h1>
    <div class="header-actions">
      <app-export-csv-button
        [resourceName]="'suppliers'"
        [columns]="columns"
        [fetchFn]="exportFn"
        [totalCount]="totalCount">
      </app-export-csv-button>
      <app-response-time-badge
        [timeMs]="responseTime"
        [error]="requestFailed">
      </app-response-time-badge>
    </div>
  </div>

  <div class="filter-bar">
    <app-search-input (searchChange)="onSearchChange($event)"></app-search-input>
    <app-dropdown-filter
      [options]="categories"
      placeholder="All Categories"
      label="Category"
      [multiple]="true"
      (multiSelectionChange)="onCategoryChange($event)">
    </app-dropdown-filter>
  </div>

  <app-error-message
    [message]="errorMessage"
    [show]="!!errorMessage">
  </app-error-message>

  <app-data-table
    [columns]="columns"
    [data]="suppliers"
    [loading]="loading"
    [page]="page"
    [pageSize]="pageSize"
    [totalCount]="totalCount"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
    (rowClick)="onRowClick($event)">
  </app-data-table>
</div>
